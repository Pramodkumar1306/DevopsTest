trigger:
- main

pool:
  name: 'pramod'  #self hosted agent pool 

# vaiable  this commonly used in multiple stages, we define them here to avoid repetition and make it easier to update in the future
variables:
  imageName: 'simple-app'
  acrName: 'pramodconteg'
  aksCluster: 'private-app-cluster'
  resourceGroup: 'pramodDevopsTest'
  namespace: 'default'

stages:

# BUILD  Installs dependencies, builds the Docker image, and pushes it to Azure Container Registry (ACR).
- stage: Build
  displayName: Build and Push Image
  jobs:
  - job: BuildJob
    steps:
# Gets code from GitHub
    - checkout: self
      clean: true
# Installs Node.js (v18), installs dependencies, builds the Docker image, and pushes it to Azure Container Registry (ACR).
    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'

    - script: npm install
      displayName: Install Dependencies
# Builds the Docker image and pushes it to ACR using the Docker@2 task.
    # 🔥 FIX (IMPORTANT)
    - script: |
        echo "Login to Azure"
        az login

        echo "Login to ACR"
        az acr login --name $(acrName)

        echo "Build Docker Image"
        docker build -t $(acrName).azurecr.io/$(imageName):$(Build.BuildId) .

        echo "Push Docker Image"
        docker push $(acrName).azurecr.io/$(imageName):$(Build.BuildId)

      displayName: Build and Push Image (Manual)

    - script: |
        echo "Image pushed: $(acrName).azurecr.io/$(imageName):$(Build.BuildId)"
      displayName: Debug Image Tag


#  DEV DEPLOY
- stage: Dev
  displayName: Deploy to Dev
  dependsOn: Build
  jobs:
  - deployment: DeployDev
    environment: dev-env
    strategy:
      runOnce:
        deploy:
          steps:
# Gets code from GitHub to ensure we have the latest k8s.yaml file, which contains the Kubernetes deployment and service definitions for the DEV environment.
          - checkout: self
# Connects to the AKS cluster using Azure CLI, applies the Kubernetes manifests, 
# updates the image in the deployment to the newly built image, and restarts the 
# deployment to trigger a rollout of the new version. This step ensures that the 
# DEV environment is updated with the latest changes and is running the new version 
# of the application.
          - script: |
              echo "Connecting to AKS..."
              az login --identity

              az aks get-credentials \
                --resource-group $(resourceGroup) \
                --name $(aksCluster) \
                --overwrite-existing

              echo "Deploying DEV..."

              kubectl apply -f $(System.DefaultWorkingDirectory)/k8s.yaml -n $(namespace)

              
              kubectl set image deployment/simple-app-dev \
                simple-app=$(acrName).azurecr.io/$(imageName):$(Build.BuildId) \
                -n $(namespace)

              kubectl rollout restart deployment simple-app-dev -n $(namespace)
              kubectl rollout status deployment simple-app-dev -n $(namespace)
# Debug step to confirm that the deployment was successful and the new image is 
#running in the DEV environment, which can help with troubleshooting and 
#verification.
            displayName: Deploy DEV


# PROD DEPLOY (WITH APPROVAL)
# This stage is similar to the DEV deployment but is intended for the PROD 
#environment. It includes an approval step before deployment, ensuring that 
#changes are reviewed and approved before being deployed to production. The 
#deployment process is the same as DEV, where it connects to AKS, applies the 
#Kubernetes manifests, updates the image, and restarts the deployment to trigger a 
#rollout of the new version in the PROD environment.
- stage: Prod
  displayName: Deploy to Prod
  dependsOn: Dev
  jobs:
  - deployment: DeployProd
    environment: prod-env
    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          - script: |
              echo "Connecting to AKS..."
              az login --identity

              az aks get-credentials \
                --resource-group $(resourceGroup) \
                --name $(aksCluster) \
                --overwrite-existing

              echo "Deploying PROD..."

              kubectl apply -f $(System.DefaultWorkingDirectory)/k8s.yaml -n $(namespace)

              kubectl set image deployment/simple-app-prod \
                simple-app=$(acrName).azurecr.io/$(imageName):$(Build.BuildId) \
                -n $(namespace)

              kubectl rollout restart deployment simple-app-prod -n $(namespace)
              kubectl rollout status deployment simple-app-prod -n $(namespace)

            displayName: Deploy PROD