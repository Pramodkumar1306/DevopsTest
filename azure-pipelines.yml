trigger:
- main

pool:
  name: 'Default'

variables:
  imageName: 'simple-app'
  acrName: 'mernacr123321'

stages:

# ✅ BUILD
- stage: Build
  displayName: Build and Push Image
  jobs:
  - job: BuildJob
    steps:

    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'

    - script: |
        npm install
      displayName: Install Dependencies

    - task: Docker@2
      displayName: Build and Push Docker Image
      inputs:
        containerRegistry: 'ACR-Service-Connection'
        repository: 'simple-app'
        command: 'buildAndPush'
        Dockerfile: 'Dockerfile'
        tags: |
          latest

# ✅ DEPLOY
- stage: Deploy
  displayName: Deploy Stage
  dependsOn: Build
  jobs:
  - deployment: DeployJob
    displayName: Deploy to AKS
    environment: prod-env
    strategy:
      runOnce:
        deploy:
          steps:

          - task: Kubernetes@1
            displayName: Apply Kubernetes Files
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: 'AKS-Service-Connection'
              namespace: 'default'
              command: apply
              useConfigurationFile: true
              configuration: |
                deployment.yaml
                service.yaml
