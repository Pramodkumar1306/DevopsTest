trigger:
- main

pool:
  name: 'Default'

variables:
  imageName: 'simple-app'
  acrName: 'mernacr123321'

stages:

# ✅ BUILD
- stage: Build
  displayName: Build and Push Image
  jobs:
  - job: BuildJob
    steps:

    - checkout: self
      clean: true

    - script: ls -la
      displayName: Check Files

    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'

    - script: npm install
      displayName: Install Dependencies

    - task: Docker@2
      displayName: Build and Push Docker Image
      inputs:
        containerRegistry: 'ACR-Service-Connection'
        repository: 'simple-app'
        command: 'buildAndPush'
        Dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
        tags: |
          $(Build.BuildId)


# ✅ DEV DEPLOY
- stage: Dev
  displayName: Dev
  dependsOn: Build
  jobs:
  - deployment: DeployDev
    environment: dev-env
    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self
            clean: true

          - task: Kubernetes@1
            displayName: Deploy to AKS (DEV)
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: 'AKS-Service-Connection'
              namespace: 'dev'
              command: apply
              useConfigurationFile: true
              configuration: '$(System.DefaultWorkingDirectory)/k8s.yaml'          - script: |
              kubectl set image deployment/simple-app simple-app=mernacr123321.azurecr.io/simple-app:$(Build.BuildId) -n dev
              kubectl rollout status deployment simple-app -n dev
            displayName: Update Image in DEV


# ✅ PROD DEPLOY
- stage: Prod
  displayName: Prod
  dependsOn: Dev
  jobs:
  - deployment: DeployProd
    environment: prod-env
    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self
            clean: true

          - task: Kubernetes@1
            displayName: Deploy to AKS (PROD)
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: 'AKS-Service-Connection'
              namespace: 'prod'
              command: apply
              useConfigurationFile: true
              configuration: '$(System.DefaultWorkingDirectory)/k8s.yaml'          - script: |
              kubectl set image deployment/simple-app simple-app=mernacr123321.azurecr.io/simple-app:$(Build.BuildId) -n prod
              kubectl rollout status deployment simple-app -n prod
            displayName: Update Image in PROD