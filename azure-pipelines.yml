trigger:
- main

pool:
  name: 'Default'

variables:
  imageName: 'simple-app'
  acrName: 'mernacr123321'

stages:

# ✅ BUILD
- stage: Build
  displayName: Build and Push Image
  jobs:
  - job: BuildJob
    steps:

    - checkout: self   # 🔥 IMPORTANT (fetch repo)

    - script: ls -la   # 🔥 DEBUG (see files)
      displayName: Check Files

    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'

    - script: npm install
      displayName: Install Dependencies

    - task: Docker@2
      displayName: Build and Push Docker Image
      inputs:
        containerRegistry: 'ACR-Service-Connection'
        repository: 'simple-app'
        command: 'buildAndPush'
        Dockerfile: 'Dockerfile'
        tags: |
          latest

# ✅ DEPLOY
- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build
  jobs:
  - deployment: DeployJob
    environment: prod-env
    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self   # 🔥 IMPORTANT AGAIN

          - script: ls -la   # 🔥 DEBUG (must show yaml files)
            displayName: Check Deployment Files

          - task: Kubernetes@1
            displayName: Deploy to AKS
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: 'AKS-Service-Connection'
              namespace: 'prod'
              command: apply
              useConfigurationFile: true
              configuration: |
                deployment.yaml
                service.yaml