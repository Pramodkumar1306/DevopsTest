trigger:
- main

pool:
  name: 'Default'   # self-hosted agent

variables:
  imageName: 'simple-app'
  acrName: 'mernacr123321'
  aksCluster: 'private-aks'
  resourceGroup: 'Devops'
  namespace: 'default'

stages:

# ✅ BUILD STAGE
- stage: Build
  displayName: Build and Push Image
  jobs:
  - job: BuildJob
    steps:

    - checkout: self
      clean: true

    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'

    - script: npm install
      displayName: Install Dependencies

    - task: Docker@2
      displayName: Build and Push Docker Image
      inputs:
        containerRegistry: 'ACR-Service-Connection'
        repository: '$(imageName)'
        command: 'buildAndPush'
        Dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
        tags: |
          $(Build.BuildId)
          latest

    - script: |
        echo "Image pushed: $(acrName).azurecr.io/$(imageName):$(Build.BuildId)"
      displayName: Debug Image Tag


# ✅ DEV DEPLOY
- stage: Dev
  displayName: Deploy to Dev
  dependsOn: Build
  jobs:
  - job: DeployDev
    steps:

    - checkout: self

    - script: |
        echo "Connecting to AKS..."
        az login --identity

        az aks get-credentials \
          --resource-group $(resourceGroup) \
          --name $(aksCluster) \
          --overwrite-existing

        echo "Deploying to Kubernetes..."

        kubectl apply -f $(System.DefaultWorkingDirectory)/k8s.yaml -n $(namespace)

        kubectl set image deployment/$(imageName) \
          $(imageName)=$(acrName).azurecr.io/$(imageName):$(Build.BuildId) \
          -n $(namespace)

        kubectl rollout restart deployment $(imageName) -n $(namespace)
        kubectl rollout status deployment $(imageName) -n $(namespace)

      displayName: Deploy to Private AKS (DEV)


# ✅ PROD DEPLOY
- stage: Prod
  displayName: Deploy to Prod
  dependsOn: Dev
  jobs:
  - job: DeployProd
    steps:

    - checkout: self

    - script: |
        echo "Connecting to AKS..."
        az login --identity

        az aks get-credentials \
          --resource-group $(resourceGroup) \
          --name $(aksCluster) \
          --overwrite-existing

        echo "Deploying to Kubernetes..."

        kubectl apply -f $(System.DefaultWorkingDirectory)/k8s.yaml -n $(namespace)

        kubectl set image deployment/$(imageName) \
          $(imageName)=$(acrName).azurecr.io/$(imageName):$(Build.BuildId) \
          -n $(namespace)

        kubectl rollout restart deployment $(imageName) -n $(namespace)
        kubectl rollout status deployment $(imageName) -n $(namespace)

      displayName: Deploy to Private AKS (PROD)