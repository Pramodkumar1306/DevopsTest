trigger:
- main

pool:
  name: 'Default'

variables:
  imageName: 'simple-app'
  acrName: 'mernacr123321'

stages:

# ✅ BUILD
- stage: Build
  displayName: Build and Push Image
  jobs:
  - job: BuildJob
    steps:

    - checkout: self

    - script: ls -la
      displayName: Check Files

    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'

    - script: npm install
      displayName: Install Dependencies

    # 🔥 FIXED DOCKER TASK
    - task: Docker@2
      displayName: Build and Push Docker Image
      inputs:
        containerRegistry: 'ACR-Service-Connection'
        repository: 'mernacr123321.azurecr.io/simple-app'   # ✅ FIXED
        command: 'buildAndPush'
        Dockerfile: '$(Build.SourcesDirectory)/Dockerfile'  # ✅ FIXED
        tags: |
          $(Build.BuildId)


# ✅ DEPLOY
- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build
  jobs:
  - deployment: DeployJob
    environment: prod-env
    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          - script: |
              echo "Current Path:"
              pwd
              echo "Files:"
              ls -la
            displayName: FINAL DEBUG

          # ✅ Apply Deployment YAML
          - task: Kubernetes@1
            displayName: Deploy to AKS
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: 'AKS-Service-Connection'
              namespace: 'prod'
              command: apply
              useConfigurationFile: true
              configuration: '$(System.DefaultWorkingDirectory)/deployment.yaml'

          # 🔥 AUTO UPDATE IMAGE (NO MANUAL RESTART)
          - script: |
              kubectl set image deployment/simple-app simple-app=mernacr123321.azurecr.io/simple-app:$(Build.BuildId) -n prod
            displayName: Update Image in AKS