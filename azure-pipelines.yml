trigger:
- main

pool:
  name: 'Default'   # your self-hosted agent (VM)

variables:
  imageName: 'simple-app'
  acrName: 'mernacr123321'

stages:

# 🔥 BUILD STAGE
- stage: Build
  displayName: Build and Push Image
  jobs:
  - job: BuildJob
    steps:

    - checkout: self
      clean: true

    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'

    - script: npm install
      displayName: Install Dependencies

    - task: Docker@2
      displayName: Build and Push Docker Image
      inputs:
        containerRegistry: 'ACR-Service-Connection'
        repository: 'simple-app'
        command: 'buildAndPush'
        Dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
        tags: |
          $(Build.BuildId)
          latest

    - script: |
        echo "Image pushed with tag: $(Build.BuildId)"
      displayName: Debug Image Tag


# 🔥 DEV DEPLOY
- stage: Dev
  displayName: Dev
  dependsOn: Build
  jobs:
  - deployment: DeployDev
    environment: dev-env
    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          - script: |
              az login --identity
              az aks get-credentials --resource-group Devops --name private-aks
              
              kubectl apply -f $(System.DefaultWorkingDirectory)/k8s.yaml
              
              kubectl set image deployment/simple-app simple-app=mernacr123321.azurecr.io/simple-app:$(Build.BuildId)
              kubectl rollout restart deployment simple-app
              kubectl rollout status deployment simple-app
            displayName: Deploy to Private AKS (DEV)


# 🔥 PROD DEPLOY
- stage: Prod
  displayName: Prod
  dependsOn: Dev
  jobs:
  - deployment: DeployProd
    environment: prod-env
    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          - script: |
              az login --identity
              az aks get-credentials --resource-group Devops --name private-aks
              
              kubectl apply -f $(System.DefaultWorkingDirectory)/k8s.yaml
              
              kubectl set image deployment/simple-app simple-app=mernacr123321.azurecr.io/simple-app:$(Build.BuildId)
              kubectl rollout restart deployment simple-app
              kubectl rollout status deployment simple-app
            displayName: Deploy to Private AKS (PROD)