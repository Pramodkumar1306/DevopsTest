trigger:
- main

pool:
  name: 'pramod'

variables:
  imageName: 'simple-app'
  acrName: 'pramodnewacr'
  aksCluster: 'private-app-cluster'
  resourceGroup: 'pramodDevopsTest'
  namespace: 'default'

stages:

- stage: Build
  displayName: Build and Push Image
  jobs:
  - job: BuildJob
    steps:
    - checkout: self
      clean: true

    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'

    - script: npm install
      displayName: Install Dependencies

    - task: Docker@2
      displayName: Build Image
      inputs:
        command: build
        repository: '$(imageName)'
        Dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
        containerRegistry: 'NewAcrConnection'
        tags: |
          latest
          $(Build.BuildId)
        arguments: '--platform linux/arm64'

    - task: Docker@2
      displayName: Push Image
      inputs:
        command: push
        repository: '$(imageName)'
        containerRegistry: 'NewAcrConnection'
        tags: |
          latest
          $(Build.BuildId)

    - script: |
        echo "Image pushed: $(acrName).azurecr.io/$(imageName):$(Build.BuildId)"
      displayName: Debug Image Tag


- stage: Dev
  displayName: Deploy to Dev
  dependsOn: Build
  jobs:
  - deployment: DeployDev
    environment: dev-env
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - script: |
              az login --identity

              az aks get-credentials \
                --resource-group $(resourceGroup) \
                --name $(aksCluster) \
                --overwrite-existing

              kubectl apply -f $(System.DefaultWorkingDirectory)/k8s.yaml -n $(namespace)

              kubectl set image deployment/simple-app-dev \
                simple-app=$(acrName).azurecr.io/$(imageName):$(Build.BuildId) \
                -n $(namespace)

              kubectl rollout restart deployment simple-app-dev -n $(namespace)
              kubectl rollout status deployment simple-app-dev -n $(namespace)

            displayName: Deploy DEV


- stage: Prod
  displayName: Deploy to Prod
  dependsOn: Dev
  jobs:
  - deployment: DeployProd
    environment: prod-env
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - script: |
              az login --identity

              az aks get-credentials \
                --resource-group $(resourceGroup) \
                --name $(aksCluster) \
                --overwrite-existing

              kubectl apply -f $(System.DefaultWorkingDirectory)/k8s.yaml -n $(namespace)

              kubectl set image deployment/simple-app-prod \
                simple-app=$(acrName).azurecr.io/$(imageName):$(Build.BuildId) \
                -n $(namespace)

              kubectl rollout restart deployment simple-app-prod -n $(namespace)
              kubectl rollout status deployment simple-app-prod -n $(namespace)

            displayName: Deploy PROD