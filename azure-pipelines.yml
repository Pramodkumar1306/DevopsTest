trigger:
- main

pool:
  name: 'Default'

variables:
  imageName: 'simple-app'
  acrName: 'mernacr123321'

stages:

# ✅ STAGE 1 — BUILD + PUSH
- stage: Build
  displayName: Build and Push Image
  jobs:
  - job: BuildJob
    steps:

    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'

    - script: |
        npm install
      displayName: Install Dependencies

    - task: Docker@2
      displayName: Build and Push Docker Image
      inputs:
        containerRegistry: 'ACR-Service-Connection'
        repository: 'simple-app'
        command: 'buildAndPush'
        Dockerfile: 'Dockerfile'
        tags: |
          latest

# ✅ STAGE 2 — DEPLOY
- stage: Deploy
  displayName: Deploy Stage
  dependsOn: Build
  jobs:
  - deployment: DeployJob
    displayName: Deploy to AKS
    environment: prod-env
    strategy:
      runOnce:
        deploy:
          steps:
          - script: |
              kubectl rollout restart deployment simple-app
            displayName: Restart AKS Deployment