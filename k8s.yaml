# 🔥 DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-app
  template:
    metadata:
      labels:
        app: simple-app
    spec:
      containers:
      - name: simple-app
        image: mernacr123321.azurecr.io/simple-app:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 4000

        env:
        - name: PORT
          value: "4000"

---

# 🔥 SERVICE
apiVersion: v1
kind: Service
metadata:
  name: simple-app
spec:
  type: ClusterIP
  selector:
    app: simple-app
  ports:
  - port: 80
    targetPort: 4000

---

# 🔥 DEV INGRESS
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: simple-app-dev-ingress
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
spec:
  rules:
  - host: dev.pramodkumar.online
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: simple-app
            port:
              number: 80

---

# 🔥 PROD INGRESS
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: simple-app-prod-ingress
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
spec:
  rules:
  - host: pramodkumar.online
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: simple-app
            port:
              number: 80