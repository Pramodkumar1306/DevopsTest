apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-app-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simple-app-dev
  template:
    metadata:
      labels:
        app: simple-app-dev
    spec:
      containers:
      - name: simple-app
        image: pramodnewacr.azurecr.io/simple-app:dev
        imagePullPolicy: Always
        ports:
        - containerPort: 4000

        env:
        - name: PORT
          value: "4000"
        - name: ENV
          value: "DEV"
        - name: DATABASE_URL
          value: "postgres://user:password@db-host:5432/devdb"

---
apiVersion: v1
kind: Service
metadata:
  name: simple-app-dev
spec:
  type: ClusterIP
  selector:
    app: simple-app-dev
  ports:
  - port: 80
    targetPort: 4000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-app-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simple-app-prod
  template:
    metadata:
      labels:
        app: simple-app-prod
    spec:
      containers:
      - name: simple-app
        image: pramodnewacr.azurecr.io/simple-app:prod
        imagePullPolicy: Always
        ports:
        - containerPort: 4000

        env:
        - name: PORT
          value: "4000"
        - name: ENV
          value: "PROD"
        - name: DATABASE_URL
          value: "postgres://user:password@db-host:5432/proddb"

---
apiVersion: v1
kind: Service
metadata:
  name: simple-app-prod
spec:
  type: ClusterIP
  selector:
    app: simple-app-prod
  ports:
  - port: 80
    targetPort: 4000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: simple-app-ingress
  annotations:
    appgw.ingress.kubernetes.io/backend-port: "4000"
    appgw.ingress.kubernetes.io/appgw-ssl-certificate: "my-ssl-cer-new"
    appgw.ingress.kubernetes.io/ssl-redirect: "true"
    appgw.ingress.kubernetes.io/health-probe-path: "/health"
    appgw.ingress.kubernetes.io/rewrite-target: "/"
spec:
  ingressClassName: azure-application-gateway
  rules:

  - host: pramodkumar.online
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: simple-app-prod
            port:
              number: 80

  - host: dev.pramodkumar.online
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: simple-app-dev
            port:
              number: 80