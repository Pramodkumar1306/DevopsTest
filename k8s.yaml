apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simple-app
  template:
    metadata:
      labels:
        app: simple-app
    spec:
      containers:
      - name: simple-app
        image: mernacr123321.azurecr.io/simple-app:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 4000

        env:
        - name: PORT
          value: "4000"

        - name: DB_HOST
          value: "pramod-postgres-db.postgres.database.azure.com"

        - name: DB_USER
          value: "azurepramod@pramod-postgres-db"

        - name: DB_PASSWORD
          value: "YOUR_PASSWORD"

        - name: DB_NAME
          value: "testdb"

        - name: DB_PORT
          value: "5432"

---
apiVersion: v1
kind: Service
metadata:
  name: simple-app
spec:
  type: ClusterIP
  selector:
    app: simple-app
  ports:
  - port: 80
    targetPort: 4000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: simple-app-ingress
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
spec:
  rules:
  - host: pramodkumar.online
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: simple-app
            port:
              number: 80