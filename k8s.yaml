# 🔥 DEV DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-app-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simple-app-dev
  template:
    metadata:
      labels:
        app: simple-app-dev
    spec:
      containers:
      - name: simple-app
        image: mernacr123321.azurecr.io/simple-app:latest
        ports:
        - containerPort: 4000
        env:
        - name: ENV
          value: "DEV"

---
# 🔥 DEV SERVICE
apiVersion: v1
kind: Service
metadata:
  name: simple-app-dev
spec:
  type: ClusterIP
  selector:
    app: simple-app-dev
  ports:
  - port: 80
    targetPort: 4000

---
# 🔥 PROD DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-app-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-app-prod
  template:
    metadata:
      labels:
        app: simple-app-prod
    spec:
      containers:
      - name: simple-app
        image: mernacr123321.azurecr.io/simple-app:latest
        ports:
        - containerPort: 4000
        env:
        - name: ENV
          value: "PROD"

---
# 🔥 PROD SERVICE
apiVersion: v1
kind: Service
metadata:
  name: simple-app-prod
spec:
  type: ClusterIP
  selector:
    app: simple-app-prod
  ports:
  - port: 80
    targetPort: 4000

---
# 🔥 DEV INGRESS
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: simple-app-dev-ingress
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
spec:
  rules:
  - host: dev.pramodkumar.online
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: simple-app-dev   # ✅ CHANGE HERE
            port:
              number: 80

---
# 🔥 PROD INGRESS
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: simple-app-prod-ingress
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
spec:
  rules:
  - host: pramodkumar.online
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: simple-app-prod   # ✅ CHANGE HERE
            port:
              number: 80